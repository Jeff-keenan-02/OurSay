


services:
  db:
    image: postgres:15
    container_name: oursay-postgres
    environment:
      POSTGRES_USER: oursay
      POSTGRES_PASSWORD: RILEY2015
      POSTGRES_DB: oursaydb
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: oursay-backend
